<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历 - 龚精奎</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 10px 0; text-align: center; }
        .container { width: 80%; margin: auto; overflow: hidden; }
        h1, h2, h3 { margin: 10px 0; }
        .skills, .experience { margin: 20px 0; }
        .skill { display: inline-block; background: #f4f4f4; border-radius: 5px; margin: 5px; padding: 10px; }
        @media (max-width: 600px) {
            .container { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>简历 - 龚精奎</h1>
    </header>
    <div class="container">
        <section class="skills">
            <h2>技能</h2>
            <div class="skill">JavaScript</div>
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">Python</div>
            <div class="skill">项目管理</div>
        </section>
        <section class="experience">
            <h2>工作经历</h2>
            <h3>软件工程师 - XYZ 公司</h3>
            <p>2023年 - 至今</p>
            <p>负责开发和维护企业级应用。</p>
            <h3>前端开发 - ABC 公司</h3>
            <p>2021年 - 2023年</p>
            <p>参与多个网站项目的开发，专注于用户界面和体验。</p>
        </section>
    </div>
</body>
</html>
